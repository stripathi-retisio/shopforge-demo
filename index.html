function renderAdminOrders(tenants, allOrders) {
  const allWithStore = allOrders.map(o => ({ ...o, storeName: tenants.find(t=>t.id===o.tenantId)?.name || o.tenantId }));
  return `
    <div class="page-header"><div class="page-title">All Orders</div><div class="page-subtitle">${allOrders.length} orders across all stores</div></div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Order</th><th>Store</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>
            ${allWithStore.map(o => `
              <tr>
                <td class="font-mono text-sm">${o.id}</td>
                <td><span class="badge badge-brand">${o.storeName}</span></td>
                <td class="text-sm">${o.customerName}</td>
                <td class="text-sm">${o.items.map(i=>`${i.emoji||'📦'} ${i.name}`).join(', ')}</td>
                <td style="font-weight:700">₹${o.total.toLocaleString()}</td>
                <td><span class="badge badge-blue">${o.paymentMethod||'Online'}</span></td>
                <td><span class="badge ${statusBadge(o.status)}">${o.status}</span></td>
                <td class="text-sm text-muted">${new Date(o.createdAt).toLocaleDateString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function attachAdminDashboard(tab) {}

function adminDeleteTenant(id) {
  if (!confirm('Delete this merchant and all their data?')) return;
  DB.deleteTenant(id);
  toast('Merchant deleted', 'info');
  Router.go('admin-dashboard', { tab: 'merchants' });
}

function adminToggleStatus(id, current, el) {
  const newStatus = current === 'active' ? 'suspended' : 'active';
  DB.updateTenant(id, { status: newStatus });
  el.textContent = newStatus;
  el.className = 'badge pointer ' + (newStatus === 'active' ? 'badge-green' : 'badge-red');
  el.onclick = () => adminToggleStatus(id, newStatus, el);
  toast('Store ' + newStatus);
}

/* ═══════════════════════════════════════════════════
   DATABASE SCHEMA PAGE
═══════════════════════════════════════════════════ */
function renderSchema() {
  const tables = [
    {
      name: 'tenants',
      desc: 'Represents each merchant/store on the platform. The core multi-tenancy entity.',
      columns: [
        ['id','VARCHAR(30)','PK','Unique tenant identifier (tenant_TIMESTAMP)'],
        ['name','VARCHAR(255)','','Store display name'],
        ['slug','VARCHAR(100)','UNIQUE','URL-safe identifier for the storefront'],
        ['email','VARCHAR(255)','UNIQUE','Merchant login email'],
        ['password','VARCHAR(255)','','Hashed password'],
        ['ownerName','VARCHAR(255)','','Full name of store owner'],
        ['plan','ENUM','','Subscription plan: starter | growth | enterprise'],
        ['status','ENUM','','Store status: active | suspended | deleted'],
        ['category','VARCHAR(100)','','Business category'],
        ['revenue','DECIMAL(12,2)','','Cumulative gross revenue'],
        ['theme','JSONB','','Brand colors, fonts, storefront theme'],
        ['settings','JSONB','','Store settings (maintenanceMode, allowReviews, etc.)'],
        ['createdAt','TIMESTAMP','','Account creation timestamp'],
        ['updatedAt','TIMESTAMP','','Last modified timestamp'],
      ]
    },
    {
      name: 'products',
      desc: 'Products listed on each merchant store. Fully scoped to a tenant.',
      columns: [
        ['id','VARCHAR(30)','PK','Unique product ID (prod_TIMESTAMP)'],
        ['tenantId','VARCHAR(30)','FK → tenants.id','Owning merchant store'],
        ['name','VARCHAR(255)','','Product display name'],
        ['description','TEXT','','Full product description'],
        ['price','DECIMAL(10,2)','','Selling price in INR (or tenant currency)'],
        ['comparePrice','DECIMAL(10,2)','NULL','Original/crossed price for discounts'],
        ['category','VARCHAR(100)','','Product category'],
        ['stock','INTEGER','','Available inventory count'],
        ['emoji','VARCHAR(10)','','Emoji icon (placeholder for image URL)'],
        ['published','BOOLEAN','','Whether visible on public storefront'],
        ['createdAt','TIMESTAMP','','Creation timestamp'],
      ]
    },
    {
      name: 'orders',
      desc: 'Customer purchase orders placed on any tenant storefront.',
      columns: [
        ['id','VARCHAR(20)','PK','Human-readable order ID (ORD-XXXXXX)'],
        ['tenantId','VARCHAR(30)','FK → tenants.id','Owning merchant store'],
        ['customerName','VARCHAR(255)','','Buyer full name'],
        ['customerEmail','VARCHAR(255)','','Buyer email for notifications'],
        ['address','TEXT','','Shipping address'],
        ['items','JSONB','','Array of {productId, name, price, qty, emoji}'],
        ['total','DECIMAL(10,2)','','Order total in INR'],
        ['paymentMethod','VARCHAR(50)','','UPI | Card | Net Banking | COD'],
        ['status','ENUM','','pending | processing | shipped | delivered | cancelled'],
        ['createdAt','TIMESTAMP','','Order placement timestamp'],
        ['updatedAt','TIMESTAMP','','Last status update timestamp'],
      ]
    },
    {
      name: 'admins',
      desc: 'Platform-level administrator accounts (Shopforge internal team).',
      columns: [
        ['id','VARCHAR(30)','PK','Admin ID'],
        ['email','VARCHAR(255)','UNIQUE','Admin login email'],
        ['password','VARCHAR(255)','','Hashed password'],
        ['name','VARCHAR(255)','','Admin display name'],
        ['role','ENUM','','super_admin | support | finance'],
        ['createdAt','TIMESTAMP','','Account creation timestamp'],
      ]
    },
    {
      name: 'sessions',
      desc: 'Active user sessions for both merchants and admins.',
      columns: [
        ['id','VARCHAR(36)','PK','UUID session token'],
        ['userId','VARCHAR(30)','FK','Reference to tenants.id or admins.id'],
        ['role','ENUM','','merchant | admin'],
        ['expiresAt','TIMESTAMP','','Session expiry timestamp'],
        ['createdAt','TIMESTAMP','','Session start timestamp'],
      ]
    },
    {
      name: 'plans',
      desc: 'Subscription plans available on the platform.',
      columns: [
        ['id','VARCHAR(20)','PK','Plan identifier: starter | growth | enterprise'],
        ['name','VARCHAR(100)','','Display name'],
        ['priceMonthly','DECIMAL(8,2)','','Monthly price in INR'],
        ['priceAnnual','DECIMAL(8,2)','','Annual price in INR'],
        ['maxProducts','INTEGER','NULL','Product limit (NULL = unlimited)'],
        ['transactionFeePercent','DECIMAL(4,2)','','% cut taken per transaction'],
        ['features','JSONB','','Array of feature flags'],
      ]
    },
  ];

  return `
    <div class="topbar">
      <div class="logo" onclick="Router.go('landing')">Shop<span>Forge</span></div>
      <div class="flex gap-3">
        <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
      </div>
    </div>
    <div class="schema-section">
      <div style="margin-bottom:40px">
        <div style="font-family:var(--font-head);font-size:32px;font-weight:800;margin-bottom:8px">Database Schema</div>
        <p style="color:var(--text2);font-size:16px;max-width:700px">Full relational schema for the ShopForge multi-tenant ecommerce platform. Built for PostgreSQL with row-level security per tenant.</p>
      </div>

      <!-- ERD visual -->
      <div class="card mb-6" style="padding:24px">
        <div class="card-title mb-4">Entity Relationship Overview</div>
        <div style="font-family:var(--font-mono);font-size:13px;color:var(--text2);line-height:2;overflow-x:auto;padding:8px">
          <div style="display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start">
            ${['plans','tenants','products','orders','sessions','admins'].map((t,i) => {
              const colors = ['#F59E0B','#FF5C28','#38BDF8','#22C55E','#A855F7','#94A3B8'];
              const rels = { tenants:'→ plans(plan)', products:'→ tenants(tenantId)', orders:'→ tenants(tenantId)', sessions:'→ tenants|admins(userId)' };
              return `
                <div style="background:var(--surface2);border:1px solid ${colors[i]}33;border-left:3px solid ${colors[i]};border-radius:8px;padding:12px 16px;min-width:180px">
                  <div style="color:${colors[i]};font-weight:700;margin-bottom:8px;font-size:14px">${t}</div>
                  ${rels[t] ? `<div style="font-size:11px;color:var(--text3)">${rels[t]}</div>` : '<div style="font-size:11px;color:var(--text3)">root entity</div>'}
                </div>
              `;
            }).join('')}
          </div>
          <div style="margin-top:20px;padding:14px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--text2)">
            <strong style="color:var(--text)">Multi-Tenancy strategy:</strong> Tenant ID foreign key on every scoped table (products, orders, sessions). Use PostgreSQL Row Level Security (RLS) policy: <code style="color:var(--brand)">USING (tenant_id = current_setting('app.current_tenant')::TEXT)</code>
          </div>
        </div>
      </div>

      ${tables.map(t => `
        <div style="margin-bottom:40px">
          <div class="flex items-center gap-3 mb-2">
            <h3 style="font-family:var(--font-head);font-size:20px;font-weight:800;color:var(--brand)">${t.name}</h3>
            <span class="badge badge-gray">TABLE</span>
          </div>
          <p style="color:var(--text2);font-size:14px;margin-bottom:14px">${t.desc}</p>
          <div class="table-wrap">
            <table class="schema-table">
              <thead><tr><th>Column</th><th>Type</th><th>Constraint</th><th>Description</th></tr></thead>
              <tbody>
                ${t.columns.map(([col,type,constraint,desc]) => `
                  <tr>
                    <td style="font-family:var(--font-mono);font-weight:700;color:var(--text)">${col}</td>
                    <td class="col-type">${type}</td>
                    <td>${constraint?`<span class="${constraint.startsWith('PK')?'col-pk':constraint.startsWith('FK')?'col-fk':'badge badge-gray'}">${constraint}</span>`:''}</td>
                    <td style="color:var(--text2);font-size:13px">${desc}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `).join('')}

      <div class="card" style="margin-bottom:60px;border-color:rgba(255,92,40,0.2)">
        <div class="card-title mb-4">📐 Indexing Strategy</div>
        <div style="font-family:var(--font-mono);font-size:13px;display:flex;flex-direction:column;gap:8px;color:var(--text2)">
          ${[
            ['tenants_slug_idx','tenants(slug)','Unique index — storefront lookup by slug'],
            ['tenants_email_idx','tenants(email)','Unique index — merchant login lookup'],
            ['products_tenant_idx','products(tenantId)','Composite with published for fast catalog queries'],
            ['products_tenant_pub_idx','products(tenantId, published)','Partial index for storefront listing'],
            ['orders_tenant_idx','orders(tenantId)','For merchant dashboard order listing'],
            ['orders_status_idx','orders(tenantId, status)','Filter orders by status'],
            ['orders_created_idx','orders(createdAt DESC)','Chronological order feeds'],
          ].map(([name,cols,note]) => `
            <div style="padding:10px 14px;background:var(--surface2);border-radius:6px">
              <span style="color:var(--warning)">CREATE INDEX</span> <span style="color:var(--text)">${name}</span>
              <span style="color:var(--info)"> ON </span><span style="color:var(--success)">${cols}</span>;
              <span style="color:var(--text3);margin-left:12px">-- ${note}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}
